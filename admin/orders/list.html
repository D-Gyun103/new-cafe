<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 관리 | 카페 어드민</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="page-header">
    <a class="back-link" href="../index.html">← 대시보드</a>
    <div class="page-header__title">주문 관리</div>
    <div class="page-header__actions"></div>
  </header>

  <main class="container admin-orders">
    <div class="admin-orders__toolbar">
      <div class="tabs" id="status-tabs">
        <button class="tab is-active" data-status="all" type="button">전체</button>
      </div>
    </div>

    <p class="admin-orders__count" id="result-count"></p>

    <div class="admin-orders__list" id="order-list"></div>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-state__icon">🧾</div>
      <p>주문 내역이 없습니다.</p>
    </div>
  </main>

  <script type="module" src="list.js"></script>
</body>
</html>
