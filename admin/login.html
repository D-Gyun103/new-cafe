<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | 카페 어드민</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <form class="glass-card login-card" id="login-form">
      <div class="login-card__heading">
        <p class="eyebrow">Admin</p>
        <h1>관리자 로그인</h1>
        <p>메뉴·주문·건의함을 관리하려면 로그인해주세요.</p>
      </div>

      <div class="field">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>

      <p class="login-card__error" id="login-error" hidden>아이디 또는 비밀번호가 올바르지 않습니다.</p>

      <div class="form-actions">
        <button class="btn btn-primary btn-block" type="submit">로그인</button>
      </div>

      <a class="login-card__back" href="../index.html">← 홈으로 돌아가기</a>
    </form>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
