<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | New Cafe</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <form class="glass-card login-card" id="login-form">
      <div class="login-card__heading">
        <p class="eyebrow">New Cafe</p>
        <h1>로그인</h1>
        <p>건의함과 마이페이지는 로그인 후 이용하실 수 있어요.</p>
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <div class="password-field">
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <button class="password-field__toggle" id="password-toggle" type="button" aria-label="비밀번호 표시">보기</button>
        </div>
      </div>

      <p class="login-card__error" id="login-error" hidden>이메일 또는 비밀번호가 올바르지 않습니다.</p>

      <div class="form-actions">
        <button class="btn btn-primary btn-block" type="submit">로그인</button>
      </div>

      <p class="login-card__switch">
        아직 계정이 없으신가요? <a id="signup-link" href="signup.html">회원가입</a>
      </p>

      <a class="login-card__back" id="back-link" href="index.html">← 홈으로 돌아가기</a>
    </form>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
