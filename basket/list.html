<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 | 카페</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="page-header">
    <a class="back-link" href="../menus/list.html">← 메뉴로</a>
    <div class="page-header__title">장바구니</div>
    <div class="page-header__actions">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="nav-menu">
        <span class="nav-toggle__bar"></span>
      </button>
      <nav class="nav-menu" id="nav-menu">
        <a class="cart-link" href="../index.html">홈</a>
        <a class="cart-link" href="../menus/list.html">메뉴</a>
        <a class="cart-link" href="../orders/list.html">주문내역</a>
        <a class="cart-link" href="../basket/list.html">
          장바구니
          <span class="cart-link__count" id="cart-count" hidden>0</span>
        </a>
        <a class="cart-link" href="../feedback/index.html">건의함</a>
        <a class="cart-link" id="nav-my-link" href="../my/index.html">마이페이지</a>
        <button class="cart-link" id="auth-nav-btn" type="button">로그인</button>
      </nav>
    </div>
  </header>

  <main class="container basket">
    <div class="basket__list" id="basket-root"></div>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-state__icon">🧺</div>
      <p>장바구니가 비어 있습니다.</p>
      <a class="btn btn-primary btn-sm" href="../menus/list.html">메뉴 보러 가기</a>
    </div>

    <div class="basket__summary" id="basket-summary" hidden>
      <div class="basket__summary-row">
        <span>총 수량</span>
        <span id="summary-count">0개</span>
      </div>
      <div class="basket__summary-row basket__summary-row--total">
        <span>총 결제금액</span>
        <span id="summary-total">0원</span>
      </div>
      <button class="btn btn-primary btn-block" id="order-btn" type="button">주문하기</button>
    </div>
  </main>

  <script type="module" src="list.js"></script>
</body>
</html>
