<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 | New Cafe</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <main class="login-page">
    <form class="glass-card login-card" id="signup-form">
      <div class="login-card__heading">
        <p class="eyebrow">New Cafe</p>
        <h1>회원가입</h1>
        <p>가입하면 건의함 제출과 마이페이지를 이용하실 수 있어요.</p>
      </div>

      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" autocomplete="name" required />
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
        <span class="hint">로그인 시 아이디로 사용됩니다.</span>
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <div class="password-field">
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />
          <button class="password-field__toggle" id="password-toggle" type="button" aria-label="비밀번호 표시">보기</button>
        </div>
      </div>

      <p class="login-card__error" id="signup-error" hidden></p>

      <div class="form-actions">
        <button class="btn btn-primary btn-block" type="submit">회원가입</button>
      </div>

      <p class="login-card__switch">
        이미 계정이 있으신가요? <a id="login-link" href="login.html">로그인</a>
      </p>

      <a class="login-card__back" href="index.html">← 홈으로 돌아가기</a>
    </form>
  </main>

  <script type="module" src="signup.js"></script>
</body>
</html>
