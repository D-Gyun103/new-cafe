<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건의함 | 카페</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="page-header">
    <button class="back-link" id="back-link" type="button">← 뒤로가기</button>
    <div class="page-header__title">건의함</div>
    <div class="page-header__actions">
      <button class="nav-toggle" id="nav-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="nav-menu">
        <span class="nav-toggle__bar"></span>
      </button>
      <nav class="nav-menu" id="nav-menu">
        <a class="cart-link" href="../index.html">홈</a>
        <a class="cart-link" href="../menus/list.html">메뉴</a>
        <a class="cart-link" href="../orders/list.html">주문내역</a>
        <a class="cart-link" href="../basket/list.html">
          장바구니
          <span class="cart-link__count" id="cart-count" hidden>0</span>
        </a>
        <a class="cart-link" id="nav-my-link" href="../my/index.html" hidden>마이페이지</a>
        <button class="cart-link" id="auth-nav-btn" type="button">로그인</button>
      </nav>
    </div>
  </header>

  <main class="container feedback-page">
    <section class="page-heading">
      <p class="eyebrow">Feedback</p>
      <h1>불편·건의사항</h1>
      <p>더 나은 카페를 만들 수 있도록 소중한 의견을 들려주세요. 접수된 내용은 운영진만 확인합니다.</p>
    </section>

    <form class="glass-card feedback-form" id="feedback-form">
      <div class="field">
        <label>구분</label>
        <div class="radio-group" id="category-group"></div>
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" placeholder="제목을 입력해주세요" required />
      </div>

      <div class="field">
        <label for="content">내용</label>
        <textarea
          id="content"
          name="content"
          placeholder="불편했던 점이나 제안하고 싶은 내용을 자유롭게 작성해주세요."
          required
        ></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary btn-block" type="submit">제출하기</button>
      </div>
    </form>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
