<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 | 카페</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="page-header">
    <div class="page-header__title">☕ 오늘의 메뉴</div>
    <div class="page-header__actions"></div>
  </header>

  <main class="container customer-menus">
    <div class="customer-menus__toolbar">
      <input
        type="search"
        id="search-input"
        placeholder="메뉴 이름으로 검색"
        aria-label="메뉴 검색"
      />
      <div class="tabs" id="category-tabs">
        <button class="tab is-active" data-category="all" type="button">전체</button>
      </div>
    </div>

    <div class="customer-menus__grid" id="menu-grid"></div>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-state__icon">🔍</div>
      <p>조건에 맞는 메뉴가 없습니다.</p>
    </div>
  </main>

  <script type="module" src="list.js"></script>
</body>
</html>
