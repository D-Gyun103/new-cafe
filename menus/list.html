<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 | 카페</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="page-header">
    <a class="back-link" href="../index.html">← 홈</a>
    <div class="page-header__title">☕ 메뉴</div>
    <div class="page-header__actions">
      <a class="cart-link" href="../orders/list.html">🧾 주문내역</a>
      <a class="cart-link" href="../basket/list.html">
        🧺 장바구니
        <span class="cart-link__count" id="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container customer-menus">
    <div class="customer-menus__toolbar">
      <label class="search-box">
        <svg class="search-box__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" />
          <path d="M17 17L13.4 13.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <input
          type="search"
          id="search-input"
          placeholder="메뉴 이름으로 검색"
          aria-label="메뉴 검색"
        />
      </label>
      <div class="tabs" id="category-tabs">
        <button class="tab is-active" data-category="all" type="button">전체</button>
      </div>
    </div>

    <div class="customer-menus__list" id="menu-root"></div>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-state__icon">🔍</div>
      <p>조건에 맞는 메뉴가 없습니다.</p>
    </div>
  </main>

  <script type="module" src="list.js"></script>
</body>
</html>
